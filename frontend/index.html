<!DOCTYPE html>
<html>
<head>
  <title>Stock Movers Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f9fc;
      color: #222;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f1f3f5;
    }

    .gain {
      color: green;
      font-weight: bold;
    }

    .loss {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Stock Movers Dashboard</h1>
    <p>Tracks the biggest daily mover from AAPL, MSFT, GOOGL, AMZN, TSLA, and NVDA.</p>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Ticker</th>
          <th>Percent Change</th>
          <th>Closing Price</th>
        </tr>
      </thead>
      <tbody id="movers-table">
        <tr>
          <td colspan="4">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const API_URL = "https://86sc0f21kk.execute-api.us-east-1.amazonaws.com/movers";

    async function loadMovers() {
      const tableBody = document.getElementById("movers-table");

      try {
        const response = await fetch(API_URL);
        const movers = await response.json();

        tableBody.innerHTML = "";

        movers.forEach((mover) => {
          const row = document.createElement("tr");
          const changeClass = mover.percent_change >= 0 ? "gain" : "loss";

          row.innerHTML = `
            <td>${mover.date}</td>
            <td>${mover.ticker}</td>
            <td class="${changeClass}">${mover.percent_change}%</td>
            <td>$${mover.closing_price}</td>
          `;

          tableBody.appendChild(row);
        });
      } catch (error) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="4">Failed to load stock movers.</td>
          </tr>
        `;
        console.error(error);
      }
    }

    loadMovers();
  </script>
</body>
</html>
