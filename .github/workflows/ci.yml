name: CI Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-project:
    name: Validate Terraform and Lambda code
    runs-on: ubuntu-latest

    steps:
      # Pulls the repository code into the GitHub Actions runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installs Python so the workflow can check Lambda syntax.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Installs Terraform so the workflow can validate infrastructure code.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # Checks that Terraform files are consistently formatted.
      - name: Check Terraform formatting
        working-directory: terraform
        run: terraform fmt -check -recursive

      # Initializes Terraform for validation without using real backend state.
      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init -backend=false

      # Validates the Terraform configuration structure.
      - name: Validate Terraform
        working-directory: terraform
        run: terraform validate

      # Checks that both Lambda files are valid Python.
      - name: Check Lambda Python syntax
        run: |
          python -m py_compile lambdas/api/lambda_function.py
          python -m py_compile lambdas/ingestion/lambda_function.py